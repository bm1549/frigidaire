name: Bump HA plugin manifest

on:
  workflow_dispatch:
    inputs:
      version:
        description: "frigidaire version to pin in the HA plugin manifest"
        required: true
        type: string

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout home-assistant-frigidaire
        uses: actions/checkout@v6
        with:
          repository: bm1549/home-assistant-frigidaire
          token: ${{ secrets.HA_PLUGIN_TOKEN }}
      - name: Bump frigidaire pin in manifest
        env:
          VERSION: ${{ inputs.version }}
        run: |
          sed -i 's/"frigidaire==[^"]*"/"frigidaire=='"$VERSION"'"/' \
            custom_components/frigidaire/manifest.json
      - name: Open PR in home-assistant-frigidaire
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.HA_PLUGIN_TOKEN }}
          branch: bump-frigidaire-${{ inputs.version }}
          title: "Bump frigidaire to ${{ inputs.version }}"
          commit-message: "Bump frigidaire to ${{ inputs.version }}"
          body: |
            Auto-generated by the frigidaire publish workflow to update the library pin to `${{ inputs.version }}`.
