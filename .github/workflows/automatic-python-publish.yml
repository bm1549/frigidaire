# This workflow will upload a Python Package using Twine when a release is created
# For more information see: https://help.github.com/en/actions/language-and-framework-guides/using-python-with-github-actions#publishing-to-package-registries

name: Upload Python Package

on:
  push:
    branches:
      - main

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0 # Required so the previous-tag action can see the full tag history
    - name: 'Get Previous tag'
      id: previoustag
      uses: "WyriHaximus/github-action-get-previous-tag@v2"
    - name: 'Get next minor version'
      id: semvers
      uses: "WyriHaximus/github-action-next-semvers@v1.2.1"
      with:
        version: ${{ steps.previoustag.outputs.tag }}
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install setuptools wheel twine
    - name: Build and publish new release
      env:
        TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
        TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
      run: |
        sed -i.bak 's/0.0.0-dev/${{ steps.semvers.outputs.patch }}/' ./setup.py
        python setup.py sdist bdist_wheel
        twine upload dist/*
    - name: 'Create GitHub release'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create "${{ steps.semvers.outputs.patch }}" \
          --title "${{ steps.semvers.outputs.patch }}" \
          --target "${{ github.sha }}" \
          --generate-notes
    - name: 'Trigger HA plugin manifest bump'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh workflow run bump-ha-plugin.yml \
          -f version="${{ steps.semvers.outputs.patch }}"
